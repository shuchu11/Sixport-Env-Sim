radar:
  f0_hz: 24000000000.0
  fs_hz: 200.0
  duration_s: 30.0

hardware:
  lo_amplitude: 1.0
  phase_err_deg: [0.0, 8.0, -5.0, 6.0]
  responsivity: [1.0, 0.85, 1.10, 0.95]
  nonlinearity: [0.02, 0.0, 0.03, 0.01]
  dc_offset: [0.0, 0.0, 0.0, 0.0]
  noise_v_rms: 0.002
  seed: 1

direct_path:
  enabled: true
  name: tx_rx_direct
  distance_m: 0.15
  transmission_loss_db: 0.1
  extra_phase: 0.0
  subtract_voltage_baseline: true

evaluation:
  target_path: chest

paths:
  - name: chest
    distance_m: 0.5
    reflectivity: 1.0
    extra_phase: 0.0
    motion:
      type: vital_signs
      resp_amp_m: 0.004
      resp_hz: 0.30
      heart_amp_m: 0.0004
      # heart_amp_m: 0.0
      heart_hz: 1.20
      resp_phase: 0.0
      heart_phase: 0.0

  - name: wall_clutter
    distance_m: 0.87
    reflectivity: 0.8
    extra_phase: 1.2
    motion:
      type: static

  - name: wall_clutter2
    distance_m: 1.00
    reflectivity: 0.1
    extra_phase: 0.8
    motion:
      type: static

  - name: wall_clutter3
    distance_m: 2.00
    reflectivity: 0.1
    extra_phase: 1.5
    motion:
      type: static

  - name: wall_clutter4
    distance_m: 2.00
    reflectivity: 0.8
    extra_phase: 1.5
    motion:
      type: static

  - name: wall_clutter5
    distance_m: 8.00
    reflectivity: 0.1
    extra_phase: 1.1
    motion:
      type: static

  - name: wall_clutter6
    distance_m: 1.2
    reflectivity: 0.1
    extra_phase: 0.8
    motion:
      type: static

